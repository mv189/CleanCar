<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes y Finanzas - AutoLavado</title>
    <link rel="stylesheet" href="../css/reports.css">
</head>
<body>
    <div class="reports-container">
        <!-- Encabezado -->
        <div class="reports-header">
            <h1>Reportes y Finanzas</h1>
            <div class="header-actions">
                <!-- Selector de mes -->
                <input type="month" class="month-filter" value="2025-09">

                <!-- Botón de exportar -->
                <button class="export-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Exportar
                </button>
            </div>
        </div>

        <!-- Resumen financiero mensual -->
        <div class="financial-summary">
            <div class="summary-card green">
                <div class="card-header">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                    <h3>Ingresos Totales del Mes</h3>
                </div>
                <p class="amount">$0</p>
                <p id="month-change" class="change">Sin datos</p>
            </div>
        </div>
    </div>

    <!-- =====================================
    🧾 LIBRERÍAS PARA GENERAR PDF
    ====================================== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <!-- Configuración general -->
    <script src="../js/config.js"></script>

    <!-- Lógica principal del reporte + exportar PDF -->
    <script src="../js/reports.js"></script>

</body>
</html>
