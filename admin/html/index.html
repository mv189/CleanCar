<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quili Wash - Panel Administrativo</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>

    <!-- Título del sistema con botones alineados -->
    <div class="system-title">
        <span>Quili Wash - Panel Administrador</span>

        <!-- Contenedor que alinea los botones -->
        <div class="header-actions">
            <button id="darkToggle" class="toggle-btn">🌙</button>

            <button class="logout-button" id="logoutBtn" title="Cerrar sesión">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Cerrar Sesión</span>
            </button>
        </div>
    </div>

    <div class="main-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">💧</div>
                    <div class="logo-text">
                        <h1>Quili Wash</h1>
                        <p>Panel Admin</p>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-button active" data-page="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
                    </svg>
                    <span>Dashboard</span>
                </button>
                
                <button class="nav-button" data-page="users">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>Lavadores</span>
                </button>

                <button class="nav-button" data-page="services">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/>
                    </svg>
                    <span>Servicios y Precios</span>
                </button>

                <button class="nav-button" data-page="reports">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14,2 14,8 20,8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10,9 9,9 8,9"/>
                    </svg>
                    <span>Reportes y Finanzas</span>
                </button>

                <button class="nav-button" data-page="vehicles">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3v5h5"/>
                        <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/>
                        <path d="M12 7v5l4 2"/>
                    </svg>
                    <span>Historial Vehículos</span>
                </button>
            </nav>

            <!-- User info -->
            <div class="user-info">
                <div class="user-avatar">A</div>
                <div class="user-details">
                    <p class="user-name">Administrador</p>
                </div>
            </div>
        </div>

        <!-- Main content -->
        <div class="main-content">
            <iframe id="contentFrame" src="../html/dashboard.html" frameborder="0" width="100%" height="100%"></iframe>
        </div>
    </div>

    <!-- Modal Cerrar Sesión -->
    <div id="logoutModal" class="logout-modal hidden">
        <div class="logout-modal-content">
            <h3 class="logout-modal-title">¿Cerrar sesión?</h3>
            <p class="logout-modal-text">Esta acción cerrará tu sesión actual.</p>
            
            <div class="logout-modal-buttons">
                <button id="cancelLogout" class="logout-btn cancel">Cancelar</button>
                <button id="confirmLogout" class="logout-btn danger">Cerrar sesión</button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/config.js"></script>

</body>
</html>
