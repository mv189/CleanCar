<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Principal - Clean car</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Dashboard Principal</h1>
            <div class="header-actions">
                
                <button class="refresh-btn" onclick="refreshDashboard()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23,4 23,10 17,10"/>
                        <path d="M20.49,15a9,9,0,1,1-2.12-9.36L23,10"/>
                    </svg>
                    Actualizar
                </button>
                <button class="export-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Exportar
                </button>
            </div>
        </div>

        <!-- Estadísticas principales -->
        <div class="stats-grid">
            <div class="stat-card green">
                <div class="stat-content">
                    <div class="stat-info">
                        <p class="stat-title">Ingresos Hoy</p>
                        <p class="stat-value" id="ingresosHoy">$0</p>
                    </div>
                    <div class="stat-icon green-bg">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"/>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="stat-card blue">
                <div class="stat-content">
                    <div class="stat-info">
                        <p class="stat-title">Vehículos Atendidos</p>
                        <p class="stat-value" id="vehiculosHoy">0</p>
                    </div>
                    <div class="stat-icon blue-bg">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
                            <path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
                            <path d="M5 17h-2v-4m-1 -2h2m3 0h6l2 7h4"/>
                            <path d="M7 8v-4m8 4v-4"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="stat-card orange">
                <div class="stat-content">
                    <div class="stat-info">
                        <p class="stat-title">Servicios Completados</p>
                        <p class="stat-value" id="serviciosHoy">0</p>
                    </div>
                    <div class="stat-icon orange-bg">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="stat-card purple">
                <div class="stat-content">
                    <div class="stat-info">
                        <p class="stat-title">Promedio por Servicio</p>
                        <p class="stat-value" id="promedio">$0</p>
                    </div>
                    <div class="stat-icon purple-bg">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Gráficas -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3>Ingresos Semanales</h3>

                <div class="chart-container">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/dashboard.js"></script>
    <script src="../js/config.js"></script>

</body>
</html>
