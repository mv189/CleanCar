<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Historial</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css1/historial.css">
</head>
<body class="bg-gray-50">
    <div class="space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-bold text-gray-900">Consultar Historial</h1>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
            <div class="flex gap-4 mb-6">
                <div class="flex-1 relative">
                    <svg class="absolute left-3 top-3 text-gray-400" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input 
                        type="text" 
                        id="searchPlate"
                        placeholder="Buscar por placa (ej: ABC-123)" 
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    />
                </div>
                <button onclick="searchVehicles()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-2">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    Buscar
                </button>
            </div>

            <!-- Filtros adicionales -->
            <div class="flex gap-4 mb-6 p-4 bg-gray-50 rounded-lg">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Filtrar por cliente:</label>
                    <input 
                        type="text" 
                        id="searchOwner"
                        placeholder="Nombre del propietario" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    />
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha desde:</label>
                    <input 
                        type="date" 
                        id="dateFrom"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    />
                </div>
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha hasta:</label>
                    <input 
                        type="date" 
                        id="dateTo"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    />
                </div>
                <div class="flex items-end">
                    <button onclick="clearFilters()" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Limpiar
                    </button>
                </div>
            </div>

            <!-- Resultados de búsqueda -->
            <div id="searchResults" class="space-y-4">
                <!-- Los resultados se cargan dinámicamente -->
            </div>

            <!-- Mensaje cuando no hay resultados -->
            <div id="noResults" class="text-center py-8 hidden">
                <svg class="text-gray-400 mx-auto mb-3" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 1v6m0 6v6"/>
                    <path d="M1 12h6m6 0h6"/>
                </svg>
                <p class="text-gray-600" id="noResultsMessage">No se encontraron vehículos que coincidan con los criterios de búsqueda</p>
            </div>

            <!-- Estadísticas rápidas -->
            <div id="quickStats" class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                    <div class="flex items-center gap-3">
                        <svg class="text-blue-600" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M8 21h8a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Z"/>
                            <path d="M16 3.5H8"/>
                            <path d="M12 16v-1"/>
                        </svg>
                        <div>
                            <h3 class="font-semibold text-blue-800">Total Vehículos</h3>
                            <p class="text-2xl font-bold text-blue-900" id="totalVehicles">0</p>
                        </div>
                    </div>
                </div>
                
                <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                    <div class="flex items-center gap-3">
                        <svg class="text-green-600" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22,4 12,14.01 9,11.01"/>
                        </svg>
                        <div>
                            <h3 class="font-semibold text-green-800">Cliente Frecuente</h3>
                            <p class="text-sm font-medium text-green-900" id="frequentClient">-</p>
                            <p class="text-xs text-green-700" id="frequentClientVisits">0 visitas</p>
                        </div>
                    </div>
                </div>
                
                <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                    <div class="flex items-center gap-3">
                        <svg class="text-yellow-600" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12,6 12,12 16,14"/>
                        </svg>
                        <div>
                            <h3 class="font-semibold text-yellow-800">Última Visita</h3>
                            <p class="text-sm font-medium text-yellow-900" id="lastVisitDate">-</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal de detalles del vehículo -->
        <div id="vehicleModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
            <div class="bg-white rounded-xl p-6 w-full max-w-2xl max-h-90vh overflow-y-auto">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-semibold text-gray-900">Detalles del Vehículo</h3>
                    <button onclick="closeVehicleModal()" class="text-gray-400 hover:text-gray-600">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                
                <div id="vehicleDetails">
                    <!-- Se llena dinámicamente -->
                </div>
                
                <div class="mt-6 flex justify-end">
                    <button onclick="closeVehicleModal()" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                        Cerrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js1/historial.js"></script>
</body>
</html>
