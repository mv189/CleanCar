<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Car - Login</title>

    <!-- ✅ Rutas corregidas -->
    <link rel="stylesheet" href="/login/login.css">
    <script defer src="/login/login.js"></script>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-container">
                <div class="logo-icon">💧</div>
            </div>

            <!-- Title -->
            <h1 class="title">Clean Car</h1>
            <p class="subtitle">Sistema de Gestión de Lavadero</p>

            <!-- Role Tabs -->
            <div class="role-tabs">
                <div class="role-tab active" id="secretarioTab">Secretario</div>
                <div class="role-tab" id="administradorTab">Administrador</div>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" class="form-input" required>
                </div>

                <button type="submit" class="btn-login">Iniciar sesión</button>
                <p id="errorMsg" class="error-message" style="color:red; text-align:center; margin-top:10px;"></p>
            </form>
        </div>
    </div>
</body>
</html>
